# ============================================================================
#  ~/.tmux.conf — Enhanced tmux config
#  Tuned for: openSUSE Tumbleweed · KDE Plasma · Wayland
#  Author:    Itachi / Team x86
# ============================================================================

# ── Prefix ───────────────────────────────────────────────────────────────────
# Change prefix from Ctrl-b to Ctrl-a (screen-style, easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # Ctrl-a Ctrl-a → send literal Ctrl-a

# ── Core Settings ────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"

# Enable true 24-bit colour (required for Neovim, modern terminals on KDE)
set -sa terminal-overrides ",xterm-256color:RGB"
set -sa terminal-overrides ",*:Tc"                # fallback

# Eliminate the 0.5 s ESC delay (vital for Vim/Neovim)
set -sg escape-time 0

# Extend scrollback buffer
set -g history-limit 50000

# Start windows and panes at 1 instead of 0 (keyboard-friendly)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on   # re-number on close

# Focus events — lets Neovim/Vim know when the terminal gains focus
set -g focus-events on

# Allow window titles to update from the running program
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string "#S · #W"

# Aggressive resize — use the smallest attached client only when active
setw -g aggressive-resize on

# ── Mouse ────────────────────────────────────────────────────────────────────
set -g mouse on
# Scroll with mouse wheel (tmux 3.x behaviour)
bind -n WheelUpPane   if-shell -F "#{alternate_on}" "send-keys Up"   "copy-mode -e; send-keys -M"
bind -n WheelDownPane if-shell -F "#{alternate_on}" "send-keys Down" "send-keys -M"

# ── Wayland Clipboard (wl-clipboard) ─────────────────────────────────────────
# Requires: sudo zypper install wl-clipboard
set -g set-clipboard on
bind -T copy-mode-vi y \
    send -X copy-pipe-and-cancel "wl-copy --no-newline"
bind -T copy-mode-vi MouseDragEnd1Pane \
    send -X copy-pipe-and-cancel "wl-copy --no-newline"
bind -T copy-mode-vi Enter \
    send -X copy-pipe-and-cancel "wl-copy --no-newline"
# Paste from Wayland clipboard with prefix + P
bind P run "wl-paste --no-newline | tmux load-buffer - && tmux paste-buffer"

# ── Vi Copy Mode ─────────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind Enter copy-mode           # Enter  → copy mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi H   send -X start-of-line
bind -T copy-mode-vi L   send -X end-of-line
bind -T copy-mode-vi /   command-prompt -p "search ▸" "send -X search-forward  '%%'"
bind -T copy-mode-vi ?   command-prompt -p "search ▸" "send -X search-backward '%%'"

# ── Window / Pane Navigation ─────────────────────────────────────────────────
# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (hold prefix, tap arrow keys)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Splits that open in the current path
bind  |  split-window -h -c "#{pane_current_path}"
bind  -  split-window -v -c "#{pane_current_path}"
bind  c  new-window      -c "#{pane_current_path}"
unbind '"'
unbind %

# Cycle windows with Alt+arrow (no prefix needed)
bind -n M-Left  previous-window
bind -n M-Right next-window

# Swap windows
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ── Reload & Miscellaneous ───────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message "⟳  Config reloaded"
bind C-k clear-history \; display-message "✓  Scrollback cleared"

# Toggle synchronise-panes (broadcast to all panes in window)
bind S setw synchronize-panes \; display-message "⟺  sync-panes: #{?synchronize-panes,ON,OFF}"

# Quick session switcher
bind Space switch-client -l

# Kill pane/window without confirmation prompt
bind x kill-pane
bind X kill-window

# ── Appearance — KDE Breeze Dark palette ────────────────────────────────────
#
#  Palette reference (Breeze Dark):
#    bg-dark   #1b1e2b    bg-mid    #232634    bg-hi     #2d3045
#    fg        #cdd6f4    fg-dim    #7b8193    accent    #5E81AC (blue)
#    green     #A3BE8C    yellow    #EBCB8B    red       #BF616A
#    cyan      #88C0D0    magenta   #B48EAD    orange    #D08770
#

# Pane borders
set -g pane-border-style        "fg=#2d3045"
set -g pane-active-border-style "fg=#5E81AC"

# Status bar — two rows of useful info
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify  left
set -g status-style    "bg=#1b1e2b,fg=#cdd6f4"

# Left segment: session name
set -g status-left-length 30
set -g status-left \
  "#[bg=#5E81AC,fg=#1b1e2b,bold]  #S #[bg=#1b1e2b,fg=#5E81AC]"

# Right segment: user@host · date/time
set -g status-right-length 70
set -g status-right \
  "#[fg=#7b8193]│ #[fg=#A3BE8C]#{?client_prefix,PREFIX ,}"\
"#[fg=#7b8193]#H #[fg=#2d3045]│ #[fg=#88C0D0]%a %d %b #[fg=#7b8193]│ #[fg=#EBCB8B]%H:%M "

# Window list style
set -g window-status-separator ""
set -g window-status-format \
  "#[fg=#7b8193,bg=#1b1e2b]  #I:#W#{?window_zoomed_flag, 󰊓,} "
set -g window-status-current-format \
  "#[fg=#1b1e2b,bg=#5E81AC,bold]  #I:#W#{?window_zoomed_flag, 󰊓,} #[fg=#5E81AC,bg=#1b1e2b]"

# Message / command prompt
set -g message-style         "bg=#EBCB8B,fg=#1b1e2b,bold"
set -g message-command-style "bg=#232634,fg=#cdd6f4"

# Copy mode highlight
set -g mode-style "bg=#5E81AC,fg=#1b1e2b"

# ── Activity Alerts ──────────────────────────────────────────────────────────
set -g monitor-activity on
set -g visual-activity  off         # don't flash; just flag in status bar
set -g activity-action  other
set -g window-status-activity-style "fg=#EBCB8B,bg=#1b1e2b"

# ── Plugin Manager (TPM) ─────────────────────────────────────────────────────
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press:  prefix + I   to install plugins
#              prefix + U   to update
#              prefix + M-u to uninstall removed plugins

set -g @plugin 'tmux-plugins/tpm'

# Sensible defaults (superset of good tmux options)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Seamless Vim/Neovim ↔ tmux pane navigation (Ctrl-h/j/k/l)
set -g @plugin 'christoomey/vim-tmux-navigator'

# Persist sessions across reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'    # save every 10 minutes

# Fast fuzzy session/window/pane switching
set -g @plugin 'sainnhe/tmux-fzf'
set -g @tmux-fzf-launch-key 'f'         # prefix + f

# Better mouse (drag-to-resize, etc.)
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Initialise TPM (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
