# ~/.config/alacritty/alacritty.toml
# Enhanced config — itachi_re | Thursday, March 26, 2026 ⚡

# ─────────────────────────────────────────
#  GENERAL
# ─────────────────────────────────────────
[general]
live_config_reload = true
import = []

# ─────────────────────────────────────────
#  ENV
# ─────────────────────────────────────────
[env]
TERM = "xterm-256color"

# ─────────────────────────────────────────
#  WINDOW
# ─────────────────────────────────────────
[window]
opacity              = 0.93
blur                 = true
decorations          = "None"          # Cleaner — no title bar chrome
decorations_theme_variant = "Dark"
dynamic_title        = true
dynamic_padding      = false
startup_mode         = "Windowed"
title                = "Alacritty"

[window.padding]
x = 14
y = 10

[window.dimensions]
columns = 0   # 0 = use system default
lines   = 0

# ─────────────────────────────────────────
#  SCROLLING
# ─────────────────────────────────────────
[scrolling]
history    = 10000
multiplier = 5

# ─────────────────────────────────────────
#  FONT  —  JetBrains Mono Nerd Font
#  Install: https://www.nerdfonts.com/font-downloads
# ─────────────────────────────────────────
[font]
size = 13.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

[font.offset]
x = 0
y = 2          # Slight line-height breathing room

[font.glyph_offset]
x = 0
y = 1


# ─────────────────────────────────────────
#  CURSOR
# ─────────────────────────────────────────
[cursor]
style           = { shape = "Block", blinking = "On" }
blink_interval  = 600
blink_timeout   = 0       # Never stops blinking
unfocused_hollow = true
thickness        = 0.15

# ─────────────────────────────────────────
#  SELECTION
# ─────────────────────────────────────────
[selection]
save_to_clipboard    = false   # true causes double-clipboard issues on many setups
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# ─────────────────────────────────────────
#  MOUSE
# ─────────────────────────────────────────
[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse  = "Middle"
action = "PasteSelection"

# ─────────────────────────────────────────
#  BELL
# ─────────────────────────────────────────
[bell]
animation = "EaseOutExpo"
duration  = 0      # Silent bell (0 = disabled)
color     = "#58a6ff"

# ─────────────────────────────────────────
#  COLORS  —  Catppuccin Mocha (tweaked)
#  Softer than pure GitHub Dark, easier on the eyes
# ─────────────────────────────────────────
[colors]
draw_bold_text_with_bright_colors = true
transparent_background_colors     = false

[colors.primary]
background   = "#1e1e2e"
foreground   = "#cdd6f4"
dim_foreground    = "#7f849c"
bright_foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5c2e7"

[colors.vi_mode_cursor]
text   = "#1e1e2e"
cursor = "#b4befe"

[colors.search.matches]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.search.focused_match]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.start]
foreground = "#1e1e2e"
background = "#f9e2af"

[colors.hints.end]
foreground = "#1e1e2e"
background = "#a6e3a1"

[colors.line_indicator]
foreground = "None"
background = "None"

[colors.footer_bar]
foreground = "#1e1e2e"
background = "#a6adc8"

[colors.selection]
text       = "#1e1e2e"
background = "#f5c2e7"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"

[colors.dim]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

# ─────────────────────────────────────────
#  HINTS  (open URLs with keyboard)
# ─────────────────────────────────────────
[[hints.enabled]]
regex           = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
command         = { program = "xdg-open", args = [] }
hyperlinks      = true
post_processing = true
persist         = false
mouse           = { enabled = true, mods = "None" }
binding         = { key = "U", mods = "Control|Shift" }

# ─────────────────────────────────────────
#  KEYBOARD BINDINGS
# ─────────────────────────────────────────
[keyboard]
bindings = [
  # Clipboard
  { key = "V",        mods = "Control|Shift", action = "Paste"            },
  { key = "C",        mods = "Control|Shift", action = "Copy"             },
  { key = "Insert",   mods = "Shift",         action = "PasteSelection"   },

  # Font size
  { key = "Equals",   mods = "Control",       action = "IncreaseFontSize" },
  { key = "Minus",    mods = "Control",       action = "DecreaseFontSize" },
  { key = "Key0",     mods = "Control",       action = "ResetFontSize"    },
  { key = "NumpadAdd",      mods = "Control", action = "IncreaseFontSize" },
  { key = "NumpadSubtract", mods = "Control", action = "DecreaseFontSize" },

  # Scrolling
  { key = "PageUp",   mods = "Shift",  action = "ScrollPageUp"   },
  { key = "PageDown", mods = "Shift",  action = "ScrollPageDown" },
  { key = "Home",     mods = "Shift",  action = "ScrollToTop"    },
  { key = "End",      mods = "Shift",  action = "ScrollToBottom" },
  { key = "K",        mods = "Alt",    action = "ScrollLineUp"   },
  { key = "J",        mods = "Alt",    action = "ScrollLineDown" },

  # Vi mode
  { key = "Space",    mods = "Control|Shift", action = "ToggleViMode" },

  # Search
  { key = "F",        mods = "Control|Shift", action = "SearchForward"   },
  { key = "B",        mods = "Control|Shift", action = "SearchBackward"  },

  # Misc
  { key = "Q",        mods = "Control|Shift", action = "Quit"            },
  { key = "Return",   mods = "Alt",           action = "ToggleFullscreen" },
]
