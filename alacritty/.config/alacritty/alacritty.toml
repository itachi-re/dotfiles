# ~/.config/alacritty/alacritty.toml
# Enhanced config by itachi_re Thursday, March 26, 2026 3:55 PM ⚡

[env]
TERM = "xterm-256color"

[window]
opacity = 0.92
blur = true

padding.x = 12
padding.y = 12

decorations = "Full"
decorations_theme_variant = "Dark"

dynamic_padding = true
startup_mode = "Windowed"
title = "Alacritty"
dynamic_title = true

[scrolling]
history = 10000
multiplier = 3

[font]
size = 14.5

[font.normal]
family = "Cascadia Code PL"
style = "Regular"

[font.bold]
family = "Cascadia Code PL"
style = "Bold"

[font.italic]
family = "Cascadia Code PL"
style = "Italic"

[font.bold_italic]
family = "Cascadia Code PL"
style = "Bold Italic"

offset.x = 0
offset.y = 1

glyph_offset.x = 0
glyph_offset.y = 0

builtin_box_drawing = true

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 500
blink_timeout = 0

unfocused_hollow = true
thickness = 0.2

[mouse]
hide_when_typing = true

[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "#0d1117"
foreground = "#c9d1d9"

[colors.cursor]
text = "#0d1117"
cursor = "#58a6ff"

[colors.normal]
black   = "#161b22"
red     = "#ff7b72"
green   = "#3fb950"
yellow  = "#d29922"
blue    = "#58a6ff"
magenta = "#bc8cff"
cyan    = "#39c5cf"
white   = "#b1bac4"

[colors.bright]
black   = "#484f58"
red     = "#ff7b72"
green   = "#3fb950"
yellow  = "#d29922"
blue    = "#58a6ff"
magenta = "#bc8cff"
cyan    = "#39c5cf"
white   = "#f0f6fc"

[keyboard]
bindings = [
  { key = "V", mods = "Control|Shift", action = "Paste" },
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "Q", mods = "Control|Shift", action = "Quit" },

  # Font size control
  { key = "Equals", mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "Key0", mods = "Control", action = "ResetFontSize" },

  # Scroll
  { key = "PageUp", mods = "Shift", action = "ScrollPageUp" },
  { key = "PageDown", mods = "Shift", action = "ScrollPageDown" },
]

[general]
live_config_reload = true
